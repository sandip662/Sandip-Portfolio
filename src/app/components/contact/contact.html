<section id="contact">

  <div class="container">

    <span class="section-tag">&lt; CONTACT &gt;</span>

    <h2 class="section-title">Contact</h2>

    <p class="section-subtitle">
      Let's connect and build something amazing together
    </p>

    <div class="contact-card">

      <h3>Get In Touch</h3>

      <div class="contact-info">

        <div class="info-box">
          <h5>Email</h5>
          <p>{{portfolio.personal.email}}</p>
        </div>

        <div class="info-box">
          <h5>Phone</h5>
          <p>{{portfolio.personal.phone}}</p>
        </div>

        <div class="info-box">
          <h5>Location</h5>
          <p>{{portfolio.personal.location}}</p>
        </div>

      </div>

      <div class="social-links">

        <a
          [href]="portfolio.socials.github"
          target="_blank">

          GitHub
        </a>

        <a
          [href]="portfolio.socials.linkedin"
          target="_blank">

          LinkedIn
        </a>

      </div>

    </div>

  </div>

</section>
